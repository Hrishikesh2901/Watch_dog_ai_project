replicaCount: 1

image:
  repository: hrishipatil193/ai-backend
  pullPolicy: Never
  tag: "v1"

# ServiceAccount Section (Jahan error aa raha tha)
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Service Section
service:
  type: ClusterIP
  port: 8000

# Ingress Section
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ai-project.local
      paths:
        - path: /
          pathType: ImplementationSpecific

# Autoscaling (HPA) Section
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Probes (Disabled for now)
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false
# HTTPRoute (Gateway API) Section
httpRoute:
  enabled: false
