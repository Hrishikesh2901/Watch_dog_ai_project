version: '3.8'

services:
  # --- AI Backend Service ---
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchdog-backend
    ports:
      - "8000:8000"
    restart: always
    # Agar AI model load hone mein time leta hai toh memory limit set kar sakte ho
    deploy:
      resources:
        limits:
          memory: 4G 

  # --- Next.js Frontend Service ---
  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchdog-frontend
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend-api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000