apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: watchdog-final-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: watchdog-frontend-v2-svc
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: watchdog-service-ai-app-chart
            port:
              number: 8000
