apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchdog-frontend
  labels:
    app: watchdog-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchdog-frontend
  template:
    metadata:
      labels:
        app: watchdog-frontend
    spec:
      containers:
      - name: frontend
        # MATCH THIS: Use the v1 image we just built and loaded
        image: hrishipatil193/ai-frontend:v1 
        imagePullPolicy: Never # Force it to use the local image we loaded
        ports:
        - containerPort: 3000
        
        # --- FIXED PROBES: Giving Next.js time to compile ---
        startupProbe:   # NEW: This prevents K8s from killing the pod during 'npm run build'
          httpGet:
            path: /
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
          
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30 # Increased from 15
          periodSeconds: 20
          
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20 # Increased from 5
          periodSeconds: 10
          
        resources:
          requests:
            memory: "256Mi" # Next.js needs a bit more than 128Mi to build
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: watchdog-frontend
  ports:
    - protocol: TCP
      port: 80       # Port for the LoadBalancer/Service
      targetPort: 3000 # Port where Next.js is running
  type: ClusterIP